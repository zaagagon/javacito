<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TecnoIA - Formulario producto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h1>TecnoIA</h1>
        <a class="active" href="/productos">Productos</a>
        <a href="#">Categorías</a>
        <a href="#">Ventas</a>
        <a href="#">Clientes</a>
        <a href="#">Reportes</a>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h2 th:text="${modo == 'nuevo' ? 'Nuevo producto' : 'Editar producto'}">Producto</h2>
                <p>Complete la información del producto tecnológico.</p>
            </div>
            <a class="btn" href="/productos">Volver</a>
        </header>

        <section class="panel form-panel">
            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                <input type="hidden" th:field="*{idProducto}">

                <label>Nombre del producto</label>
                <input type="text" th:field="*{nombre}" placeholder="Ej. Mouse Gamer X1" required>

                <label>Categoría</label>
                <select th:field="*{categoria}" required>
                    <option value="">Seleccione una categoría</option>
                    <option value="Accesorios">Accesorios</option>
                    <option value="Monitores">Monitores</option>
                    <option value="Componentes">Componentes</option>
                    <option value="Almacenamiento">Almacenamiento</option>
                    <option value="Computadores">Computadores</option>
                </select>

                <div class="grid-2">
                    <div>
                        <label>Precio</label>
                        <input type="number" step="0.01" min="0" th:field="*{precio}" placeholder="Ej. 85000" required>
                    </div>
                    <div>
                        <label>Stock</label>
                        <input type="number" min="0" th:field="*{stock}" placeholder="Ej. 10" required>
                    </div>
                </div>

                <div class="form-actions">
                    <a class="btn" href="/productos">Cancelar</a>
                    <button class="btn primary" type="submit" th:text="${modo == 'nuevo' ? 'Guardar' : 'Actualizar'}">Guardar</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
